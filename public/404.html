<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // GitHub Pages SPA redirect
      var path = window.location.pathname;
      var repo = '/autoleverandoren';
      if (path !== repo && path !== repo + '/') {
        window.location.replace(repo + '/?redirect=' + encodeURIComponent(path.replace(repo, '')));
      }
    </script>
  </head>
  <body></body>
</html>
